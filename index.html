<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>梦角字卡传讯</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- 默认首页：仅图标，点击跳转 -->
<div class="page home-page active">
  <div class="home-container">
    <h2 class="home-title">梦角工具箱</h2>
    <div class="app-grid">
      <div class="app-card" data-target="chat-page">
        <img class="app-icon" id="chatAppIcon" alt="聊天图标">
      </div>
      <div class="app-card" data-target="card-page">
        <img class="app-icon" id="cardAppIcon" alt="字卡图标">
      </div>
      <div class="app-card" data-target="setting-page">
        <img class="app-icon" id="themeAppIcon" alt="外观设置">
      </div>
    </div>
  </div>
</div>

<!-- 外观设置页面：统一配置所有应用图标 -->
<div class="page setting-page">
  <div class="setting-container">
    <h3>外观图标配置</h3>
    <div class="icon-input-item">
      <label>聊天图标链接</label>
      <input type="text" id="chatIconUrl" placeholder="粘贴图片URL">
    </div>
    <div class="icon-input-item">
      <label>字卡库图标链接</label>
      <input type="text" id="cardIconUrl" placeholder="粘贴图片URL">
    </div>
    <div class="icon-input-item">
      <label>外观设置图标链接</label>
      <input type="text" id="themeIconUrl" placeholder="粘贴图片URL">
    </div>
    <button id="saveThemeBtn" class="save-theme">保存外观配置</button>
    <div class="tip-text">保存后刷新页面即可生效</div>
  </div>
</div>

<!-- 聊天页顶部栏：头像点击直接修改头像 -->
<div class="top-header">
  <div class="avatar-box" id="avatarClickEdit">
    <img class="avatar-img" id="avatarImg" alt="角色头像">
    <span class="avatar-txt" id="avatarText">角</span>
  </div>
  <div class="dream-name" id="targetName">梦角</div>
  <button class="setting-btn" id="openSet">⚙</button>
</div>

<!-- 聊天页面 -->
<div class="page chat-page">
  <div class="chat-box" id="chatWrap"></div>
  <div class="input-area" id="inputWrap">
    <input type="text" id="inputText" placeholder="输入想要发送的话...">
    <button id="sendBtn">发送</button>
  </div>
</div>

<!-- 字卡+分组管理页面 -->
<div class="page card-page">
  <div class="card-container">
    <div class="group-op-bar">
      <input type="text" id="newGroupName" placeholder="新建分组名称">
      <button id="createGroupBtn">创建分组</button>
    </div>
    <div class="group-list" id="groupListWrap"></div>
    <label>当前操作分组</label>
    <select id="currentGroupSelect"></select>
    <div class="card-add-bar">
      <input type="text" id="newCardInput" placeholder="添加单条字卡">
      <button id="addSingleCard">添加</button>
    </div>
    <div class="batch-import-wrap">
      <textarea id="batchTextarea" placeholder="批量导入，一行一条"></textarea>
      <button id="batchImportBtn">批量导入</button>
    </div>
    <div class="card-list-title">当前分组字卡（编辑/删除/屏蔽）</div>
    <div class="card-list" id="cardListWrap"></div>
  </div>
</div>

<!-- 底部Tab导航 -->
<div class="tab-bar">
  <div class="tab-item" data-page="home-page">首页</div>
  <div class="tab-item" data-page="chat-page">聊天</div>
  <div class="tab-item" data-page="card-page">字卡库</div>
  <div class="tab-item" data-page="setting-page">外观</div>
</div>

<!-- 全局设置弹窗：昵称、文字头像、延迟配置 -->
<div class="mask" id="mask">
  <div class="panel">
    <h3>基础设置 & 回复时长配置</h3>
    <label>梦角昵称</label>
    <input type="text" id="nameInput">
    <label>备用文字头像</label>
    <input type="text" id="headText" maxlength="1">
    <label>最小等待秒数</label>
    <input type="number" id="minDelaySec" min="1" value="20">
    <label>最大等待秒数</label>
    <input type="number" id="maxDelaySec" min="1" value="60">
    <div class="btns-wrap">
      <button class="close" id="closeSet">取消</button>
      <button class="save" id="saveSet">保存</button>
    </div>
  </div>
</div>

<!-- 头像单独修改弹窗 -->
<div class="mask" id="avatarMask">
  <div class="panel">
    <h3>修改角色头像</h3>
    <label>头像图片链接</label>
    <input type="text" id="avatarUrlInput" placeholder="粘贴网络图片地址">
    <div class="btns-wrap">
      <button class="close" id="closeAvatarSet">取消</button>
      <button class="save" id="saveAvatarBtn">确定使用该头像</button>
    </div>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
