<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>梦角字卡传讯</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- 默认首页 -->
<div class="page home-page active">
  <div class="home-container">
    <h2 class="home-title">梦角工具箱</h2>
    <div class="app-grid">
      <div class="app-card" data-target="chat-page">
        <img class="app-icon" id="chatAppIcon" alt="聊天图标">
        <span class="app-label">聊天传讯</span>
      </div>
      <div class="app-card" data-target="card-page">
        <img class="app-icon" id="cardAppIcon" alt="字卡图标">
        <span class="app-label">字卡管理</span>
      </div>
      <div class="app-card" data-target="setting-page">
        <img class="app-icon" id="themeAppIcon" alt="外观设置">
        <span class="app-label">外观设置</span>
      </div>
    </div>
  </div>
</div>

<!-- 外观设置页面 -->
<div class="page setting-page">
  <div class="page-header">
    <button class="back-btn">← 返回</button>
    <h3 class="page-title">外观设置</h3>
  </div>
  <div class="setting-container">
    <!-- 壁纸区块 -->
    <div class="setting-block">
      <h4 class="block-title">主页壁纸</h4>
      <div class="wallpaper-row">
        <div class="preview-box">
          <img id="wallpaperPreview" class="preview-img" alt="壁纸预览">
        </div>
        <button class="change-btn" id="openWallpaperModal">更换壁纸</button>
      </div>
    </div>

    <!-- 图标区块 -->
    <div class="setting-block">
      <h4 class="block-title">应用图标设置</h4>
      <div class="icon-set-item">
        <div class="preview-box small">
          <img id="chatIconPreview" class="preview-img" alt="聊天图标预览">
        </div>
        <span class="item-name">聊天传讯图标</span>
        <button class="change-btn" data-type="chat">更改</button>
      </div>
      <div class="icon-set-item">
        <div class="preview-box small">
          <img id="cardIconPreview" class="preview-img" alt="字卡图标预览">
        </div>
        <span class="item-name">字卡管理图标</span>
        <button class="change-btn" data-type="card">更改</button>
      </div>
      <div class="icon-set-item">
        <div class="preview-box small">
          <img id="themeIconPreview" class="preview-img" alt="外观图标预览">
        </div>
        <span class="item-name">外观设置图标</span>
        <button class="change-btn" data-type="theme">更改</button>
      </div>
    </div>
    <div class="tip-text">所有设置保存后刷新页面生效</div>
  </div>
</div>

<!-- 聊天页顶部栏 -->
<div class="top-header">
  <button class="back-btn">←</button>
  <div class="avatar-box" id="avatarClickEdit">
    <img class="avatar-img" id="avatarImg" alt="角色头像">
    <span class="avatar-txt" id="avatarText">角</span>
  </div>
  <div class="dream-name" id="targetName">梦角</div>
  <button class="setting-btn" id="openSet">⚙</button>
</div>

<!-- 聊天页面 -->
<div class="page chat-page">
  <div class="chat-box" id="chatWrap"></div>
  <div class="input-area" id="inputWrap">
    <input type="text" id="inputText" placeholder="输入想要发送的话...">
    <button id="sendBtn">发送</button>
  </div>
</div>

<!-- 字卡+分组管理页面 -->
<div class="page card-page">
  <div class="page-header">
    <button class="back-btn">← 返回</button>
    <h3 class="page-title">字卡管理</h3>
  </div>
  <div class="card-container">
    <div class="group-op-bar">
      <input type="text" id="newGroupName" placeholder="新建分组名称">
      <button id="createGroupBtn">创建分组</button>
    </div>
    <div class="group-list" id="groupListWrap"></div>
    <label>当前操作分组</label>
    <select id="currentGroupSelect"></select>
    <div class="card-add-bar">
      <input type="text" id="newCardInput" placeholder="添加单条字卡">
      <button id="addSingleCard">添加</button>
    </div>
    <div class="batch-import-wrap">
      <textarea id="batchTextarea" placeholder="批量导入，一行一条"></textarea>
      <button id="batchImportBtn">批量导入</button>
    </div>
    <div class="card-list-title">当前分组字卡（编辑/删除/屏蔽）</div>
    <div class="card-list" id="cardListWrap"></div>
  </div>
</div>

<!-- 通用图片选择弹窗：壁纸、图标、头像共用 -->
<div class="mask" id="imageSelectMask">
  <div class="panel image-panel">
    <h3 id="modalTitle">选择图片</h3>
    <div class="upload-item">
      <label>上传本地图片</label>
      <input type="file" id="localImageFile" accept="image/*">
    </div>
    <div class="link-item">
      <label>填入图片链接</label>
      <input type="text" id="imageLinkInput" placeholder="粘贴网络图片地址">
    </div>
    <div class="btns-wrap">
      <button class="close" id="closeImageModal">取消</button>
      <button class="save" id="confirmImageBtn">确定使用</button>
    </div>
  </div>
</div>

<!-- 全局设置弹窗 -->
<div class="mask" id="mask">
  <div class="panel">
    <h3>基础设置 & 回复时长配置</h3>
    <label>梦角昵称</label>
    <input type="text" id="nameInput">
    <label>备用文字头像</label>
    <input type="text" id="headText" maxlength="1">
    <label>最小等待秒数</label>
    <input type="number" id="minDelaySec" min="1" value="20">
    <label>最大等待秒数</label>
    <input type="number" id="maxDelaySec" min="1" value="60">
    <div class="btns-wrap">
      <button class="close" id="closeSet">取消</button>
      <button class="save" id="saveSet">保存</button>
    </div>
  </div>
</div>

<!-- 头像修改弹窗 -->
<div class="mask" id="avatarMask">
  <div class="panel image-panel">
    <h3>修改角色头像</h3>
    <div class="upload-item">
      <label>上传本地图片</label>
      <input type="file" id="avatarLocalFile" accept="image/*">
    </div>
    <div class="link-item">
      <label>填入图片链接</label>
      <input type="text" id="avatarLinkInput" placeholder="粘贴网络图片地址">
    </div>
    <div class="btns-wrap">
      <button class="close" id="closeAvatarSet">取消</button>
      <button class="save" id="saveAvatarBtn">确定使用该头像</button>
    </div>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
