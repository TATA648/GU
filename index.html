<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>梦角字卡传讯</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== 首页 ===== -->
  <div class="page home-page active">
    <div class="home-container">
      <h2 class="home-title">梦角工具箱</h2>
      <div class="app-grid">
        <div class="app-card" data-target="chat-page">
          <img class="app-icon" id="chatAppIcon" alt="聊天图标" />
          <span class="app-label">聊天传讯</span>
        </div>
        <div class="app-card" data-target="card-page">
          <img class="app-icon" id="cardAppIcon" alt="字卡图标" />
          <span class="app-label">字卡管理</span>
        </div>
        <div class="app-card" data-target="setting-page">
          <img class="app-icon" id="themeAppIcon" alt="外观设置" />
          <span class="app-label">外观设置</span>
        </div>
        <div class="app-card" data-target="mail-page">
          <img class="app-icon" id="mailAppIcon" alt="信箱图标" />
          <span class="app-label">信箱</span>
        </div>
        <div class="app-card" data-target="calendar-page">
          <img class="app-icon" id="calendarAppIcon" alt="日历图标" />
          <span class="app-label">日历</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 外观设置页（新增数据管理模块） ===== -->
  <div class="page setting-page">
    <div class="page-header">
      <button class="back-btn">← 返回</button>
      <h3 class="page-title">外观设置</h3>
    </div>
    <div class="setting-container">
      <!-- 原有壁纸、图标设置不变（略）... 为了节省篇幅，此处仅展示新增的数据管理模块，完整代码请见附件 -->
      <!-- 实际使用时请保留原有壁纸和图标设置区块 -->
      <div class="setting-block">
        <h4 class="block-title">数据管理</h4>
        <div style="display:flex; gap:12px; flex-wrap:wrap;">
          <button class="change-btn" id="exportDataBtn">导出数据</button>
          <button class="change-btn" id="importDataBtn">导入数据</button>
        </div>
        <div style="font-size:12px; color:#999; margin-top:8px;">导出为JSON文件，导入将覆盖当前所有数据</div>
      </div>
      <!-- 动画开关等 -->
      <div class="setting-block">
        <h4 class="block-title">页面切换动画</h4>
        <div class="toggle-row">
          <span class="toggle-label">启用平滑切换</span>
          <div class="toggle-switch active" id="animToggle">
            <div class="toggle-knob"></div>
          </div>
        </div>
      </div>
      <div class="tip-text">所有设置保存后刷新页面生效</div>
    </div>
  </div>

  <!-- ===== 聊天设置页（不变） ===== -->
  <div class="page chat-set-page">
    <div class="page-header">
      <button class="back-btn chat-set-back">← 返回聊天</button>
      <h3 class="page-title">聊天设置</h3>
    </div>
    <div class="setting-container">
      <div class="set-block-item" id="blockTa">关于TA</div>
      <div class="set-block-item" id="blockMe">关于我</div>
      <div class="set-block-item" id="blockDelay">回复时长</div>
      <div class="set-block-item" id="blockStatus">当前状态（梦角）</div>
      <div class="set-block-item">
        <div class="block-title">聊天背景壁纸</div>
        <div class="wallpaper-row reverse">
          <button class="change-btn" id="openChatBgModal">更换背景</button>
          <div class="preview-box rect-v">
            <img id="chatBgPreview" class="preview-img" alt="竖版聊天背景预览" />
          </div>
        </div>
      </div>
      <button class="save-btn" id="saveChatSetting">保存全部设置</button>
    </div>
  </div>

  <!-- ===== 聊天页（新增状态显示 + 引用区域） ===== -->
  <div class="page chat-page">
    <div class="top-header">
      <button class="back-btn">←</button>
      <div class="header-avatar-group">
        <div class="header-avatar">
          <img id="headerTaAvatar" alt="角色头像" />
        </div>
        <div class="header-avatar">
          <img id="headerMyAvatar" alt="我的头像" />
        </div>
      </div>
      <div class="dream-name" id="targetName">梦角</div>
      <button class="setting-btn" id="openChatSettingPage">⚙</button>
    </div>
    <!-- 状态显示区域 -->
    <div class="status-bar" id="statusBar">
      <span class="status-label">梦角状态：</span>
      <span class="status-text" id="currentStatusText">平静</span>
    </div>
    <!-- 消息容器 -->
    <div class="chat-box" id="chatWrap"></div>
    <!-- 引用消息提示条 -->
    <div class="quote-bar" id="quoteBar" style="display:none;">
      <span class="quote-content" id="quoteContent">引用消息</span>
      <button class="quote-close" id="quoteClose">✕</button>
    </div>
    <!-- 输入区域（修复显示） -->
    <div class="input-area" id="inputWrap">
      <button class="emoji-toggle-btn" id="emojiToggle">😊</button>
      <input type="text" id="inputText" placeholder="输入想要发送的话..." autocomplete="off" />
      <button id="sendBtn">发送</button>
    </div>
    <!-- 表情面板 -->
    <div class="emoji-panel" id="emojiPanel">
      <div class="emoji-add-bar">
        <input type="file" id="emojiFileInput" accept="image/*" />
        <input type="text" id="emojiLinkInput" placeholder="粘贴表情图片链接" />
        <button id="addEmojiBtn">添加表情</button>
      </div>
      <div class="emoji-list" id="emojiList"></div>
    </div>
  </div>

  <!-- ===== 字卡管理页（不变） ===== -->
  <div class="page card-page">
    <div class="page-header">
      <button class="back-btn">← 返回</button>
      <h3 class="page-title">字卡管理</h3>
    </div>
    <div class="card-container">
      <div class="group-op-bar">
        <input type="text" id="newGroupName" placeholder="新建分组名称" autocomplete="off" />
        <button id="createGroupBtn">创建分组</button>
      </div>
      <div class="group-list" id="groupListWrap"></div>
      <label style="font-size:13px;color:#555;margin-bottom:4px;display:block;">当前操作分组</label>
      <select id="currentGroupSelect"></select>
      <div class="card-add-bar">
        <input type="text" id="newCardInput" placeholder="添加单条字卡" autocomplete="off" />
        <button id="addSingleCard">添加</button>
      </div>
      <div class="batch-import-wrap">
        <textarea id="batchTextarea" placeholder="批量导入，一行一条"></textarea>
        <button id="batchImportBtn">批量导入</button>
      </div>
      <div class="card-list-title">当前分组字卡（编辑/删除/屏蔽）</div>
      <div class="card-list" id="cardListWrap"></div>
    </div>
  </div>

  <!-- ===== 信箱页（不变） ===== -->
  <div class="page mail-page">
    <div class="page-header">
      <button class="back-btn">← 返回</button>
      <h3 class="page-title">信箱</h3>
    </div>
    <div class="mail-container">
      <div class="mail-tab-bar">
        <button class="mail-tab active" data-tab="write">写信</button>
        <button class="mail-tab" data-tab="inbox">收件箱</button>
      </div>
      <div class="write-box">
        <textarea id="letterInput" placeholder="写下你想发送的信件..."></textarea>
        <button class="send-letter-btn" id="sendLetterBtn">寄出信件</button>
      </div>
      <div class="inbox-box hidden" id="inboxWrap"></div>
    </div>
  </div>

  <!-- ===== 日历页（新增） ===== -->
  <div class="page calendar-page">
    <div class="page-header">
      <button class="back-btn">← 返回</button>
      <h3 class="page-title">日历</h3>
    </div>
    <div class="calendar-container">
      <!-- 顶部文字记录 -->
      <div class="calendar-text-area">
        <div class="cal-text-item ta-text" id="calTaText">TA今天还没有记录哦～</div>
        <div class="cal-text-item me-text" id="calMeText">今天有什么想说的。</div>
      </div>
      <!-- 日历网格 -->
      <div class="calendar-grid" id="calendarGrid"></div>
      <!-- 底部按钮 -->
      <button class="calendar-mood-btn" id="openMoodModal">记录心情</button>
    </div>
  </div>

  <!-- ===== 通用图片选择弹窗（不变） ===== -->
  <div class="mask" id="imageSelectMask">
    <div class="panel image-panel">
      <h3 id="modalTitle">选择图片</h3>
      <div class="upload-item">
        <label>上传本地图片</label>
        <input type="file" id="localImageFile" accept="image/*" />
      </div>
      <div class="link-item">
        <label>填入图片链接</label>
        <input type="text" id="imageLinkInput" placeholder="粘贴网络图片地址" autocomplete="off" />
      </div>
      <div class="btns-wrap">
        <button class="close" id="closeImageModal">取消</button>
        <button class="save" id="confirmImageBtn">确定使用</button>
      </div>
    </div>
  </div>

  <!-- ===== 关于TA弹窗（不变） ===== -->
  <div class="mask" id="taMask">
    <div class="panel">
      <h3>角色信息设置</h3>
      <div class="upload-item">
        <label>角色头像（本地上传）</label>
        <input type="file" id="taAvatarFile" accept="image/*" />
      </div>
      <div class="link-item">
        <label>角色头像（图片链接）</label>
        <input type="text" id="taAvatarLink" placeholder="粘贴头像链接" autocomplete="off" />
      </div>
      <label style="font-size:14px;color:#444;">角色昵称</label>
      <input type="text" id="taNameInput" placeholder="角色昵称" autocomplete="off" />
      <div class="btns-wrap">
        <button class="close" id="closeTaSet">取消</button>
        <button class="save" id="saveTaSet">保存</button>
      </div>
    </div>
  </div>

  <!-- ===== 关于我弹窗（不变） ===== -->
  <div class="mask" id="meMask">
    <div class="panel">
      <h3>个人信息设置</h3>
      <div class="upload-item">
        <label>我的头像（本地上传）</label>
        <input type="file" id="meAvatarFile" accept="image/*" />
      </div>
      <div class="link-item">
        <label>我的头像（图片链接）</label>
        <input type="text" id="meAvatarLink" placeholder="粘贴头像链接" autocomplete="off" />
      </div>
      <label style="font-size:14px;color:#444;">我的昵称</label>
      <input type="text" id="meNameInput" placeholder="我的昵称" autocomplete="off" />
      <div class="btns-wrap">
        <button class="close" id="closeMeSet">取消</button>
        <button class="save" id="saveMeSet">保存</button>
      </div>
    </div>
  </div>

  <!-- ===== 回复时长弹窗（不变） ===== -->
  <div class="mask" id="delayMask">
    <div class="panel">
      <h3>回复间隔设置</h3>
      <label style="font-size:14px;color:#444;">最小等待秒数（最低20）</label>
      <input type="number" id="minDelayInput" min="20" value="20" />
      <label style="font-size:14px;color:#444;margin-top:8px;">最大等待秒数（最高120）</label>
      <input type="number" id="maxDelayInput" max="120" value="120" />
      <div class="btns-wrap">
        <button class="close" id="closeDelaySet">取消</button>
        <button class="save" id="saveDelaySet">保存</button>
      </div>
    </div>
  </div>

  <!-- ===== 状态设置弹窗（新增） ===== -->
  <div class="mask" id="statusMask">
    <div class="panel">
      <h3>设置梦角当前状态</h3>
      <input type="text" id="statusInput" placeholder="输入状态文字，如'开心'" />
      <div class="btns-wrap">
        <button class="close" id="closeStatusSet">取消</button>
        <button class="save" id="saveStatusSet">保存</button>
      </div>
    </div>
  </div>

  <!-- ===== 日历心情记录弹窗（新增） ===== -->
  <div class="mask" id="moodModal">
    <div class="panel">
      <h3>记录今日心情</h3>
      <div class="mood-emoji-grid" id="moodEmojiGrid">
        <!-- 动态生成表情符号 -->
      </div>
      <label style="font-size:14px;color:#444;margin-top:10px;display:block;">想说的话</label>
      <input type="text" id="moodTextInput" placeholder="写下你想说的话..." />
      <div class="btns-wrap">
        <button class="close" id="closeMoodModal">取消</button>
        <button class="save" id="saveMoodModal">保存</button>
      </div>
    </div>
  </div>

  <!-- ===== 导入确认弹窗（新增） ===== -->
  <div class="mask" id="importConfirmMask">
    <div class="panel">
      <h3>确认导入</h3>
      <p style="margin:16px 0;">导入后会覆盖当前所有数据，是否继续？</p>
      <div class="btns-wrap">
        <button class="close" id="importCancelBtn">退出</button>
        <button class="save" id="importConfirmBtn">继续</button>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
