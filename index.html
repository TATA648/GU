<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>梦角字卡传讯</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- 首页主页面 默认进入 -->
<div class="page home-page active">
  <div class="home-container">
    <h2 class="home-title">梦角工具箱</h2>
    <div class="app-grid">
      <div class="app-card" data-target="chat-page">
        <img class="app-icon" id="chatAppIcon" src="" alt="聊天图标">
        <div class="app-name">聊天传讯</div>
      </div>
      <div class="app-card" data-target="card-page">
        <img class="app-icon" id="cardAppIcon" src="" alt="字卡图标">
        <div class="app-name">字卡管理</div>
      </div>
    </div>
    <div class="icon-set-wrap">
      <p>自定义图标链接（填写后刷新生效）</p>
      <input type="text" id="chatIconUrl" placeholder="聊天图标图片链接">
      <input type="text" id="cardIconUrl" placeholder="字卡图标图片链接">
      <button id="saveIconBtn">保存图标</button>
    </div>
  </div>
</div>

<!-- 顶部固定头部 仅聊天页面显示 -->
<div class="top-header">
  <div class="avatar-box">
    <img class="avatar-img" id="avatarImg" src="" alt="角色头像">
    <span class="avatar-txt" id="avatarText">角</span>
  </div>
  <div class="dream-name" id="targetName">梦角</div>
  <button class="setting-btn" id="openSet">⚙</button>
</div>

<!-- 聊天页面 -->
<div class="page chat-page">
  <div class="chat-box" id="chatWrap"></div>
  <div class="input-area" id="inputWrap">
    <input type="text" id="inputText" placeholder="输入想要发送的话...">
    <button id="sendBtn">发送</button>
  </div>
</div>

<!-- 字卡+分组管理页面 -->
<div class="page card-page">
  <div class="card-container">
    <div class="group-op-bar">
      <input type="text" id="newGroupName" placeholder="新建分组名称">
      <button id="createGroupBtn">创建分组</button>
    </div>
    <div class="group-list" id="groupListWrap"></div>
    <label>当前操作分组</label>
    <select id="currentGroupSelect"></select>
    <div class="card-add-bar">
      <input type="text" id="newCardInput" placeholder="添加单条字卡">
      <button id="addSingleCard">添加</button>
    </div>
    <div class="batch-import-wrap">
      <textarea id="batchTextarea" placeholder="批量导入，一行一条"></textarea>
      <button id="batchImportBtn">批量导入</button>
    </div>
    <div class="card-list-title">当前分组字卡（编辑/删除/屏蔽）</div>
    <div class="card-list" id="cardListWrap"></div>
  </div>
</div>

<!-- 底部Tab导航 -->
<div class="tab-bar">
  <div class="tab-item" data-page="home-page">首页</div>
  <div class="tab-item" data-page="chat-page">聊天</div>
  <div class="tab-item" data-page="card-page">字卡库</div>
</div>

<!-- 设置弹窗 -->
<div class="mask" id="mask">
  <div class="panel">
    <h3>基础设置 & 回复时长配置</h3>
    <label>梦角昵称</label>
    <input type="text" id="nameInput">
    <label>角色头像图片链接</label>
    <input type="text" id="avatarUrlInput" placeholder="粘贴图片URL，留空显示文字头像">
    <label>文字头像（图片失效时备用）</label>
    <input type="text" id="headText" maxlength="1">
    <label>最小等待秒数</label>
    <input type="number" id="minDelaySec" min="1" value="20">
    <label>最大等待秒数</label>
    <input type="number" id="maxDelaySec" min="1" value="60">
    <div class="btns-wrap">
      <button class="close" id="closeSet">取消</button>
      <button class="save" id="saveSet">保存</button>
    </div>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
